{% extends "base.html" %}

{% block title %}Edit Expense - Spendly{% endblock %}

{% block content %}
<div class="auth-section">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-title">Edit Expense</h1>
            <p class="auth-subtitle">Update the details of your spending entry.</p>
        </div>

        <div class="auth-card">
            <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}">
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" name="amount" step="0.01" min="0.01" value="{{ expense.amount }}" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="" disabled>Select a category</option>
                        {% for category in categories %}
                        <option value="{{ category }}" {% if category == expense.category_name %}selected{% endif %}>{{ category }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" value="{{ expense.date }}" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="description">Description (Optional)</label>
                    <textarea id="description" name="description" placeholder="What was this for?" class="form-input" style="resize: vertical; min-height: 80px;">{{ expense.description }}</textarea>
                </div>

                <button type="submit" class="btn-submit">Update Expense</button>

                <div class="auth-switch" style="margin-top: 1.5rem;">
                    <a href="{{ url_for('profile') }}">Cancel and return to profile</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
