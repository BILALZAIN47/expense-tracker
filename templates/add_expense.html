{% extends "base.html" %}

{% block title %}Add Expense - Spendly{% endblock %}

{% block content %}
<div class="auth-section">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-title">Add Expense</h1>
            <p class="auth-subtitle">Record a new spending entry to your tracker.</p>
        </div>

        <div class="auth-card">
            <form method="POST" action="{{ url_for('add_expense') }}">
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" name="amount" step="0.01" min="0.01" placeholder="0.00" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="" disabled selected>Select a category</option>
                        {% for category in categories %}
                        <option value="{{ category }}">{{ category }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" value="{{ today }}" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="description">Description (Optional)</label>
                    <textarea id="description" name="description" placeholder="What was this for?" class="form-input" style="resize: vertical; min-height: 80px;"></textarea>
                </div>

                <button type="submit" class="btn-submit">Add Expense</button>

                <div class="auth-switch" style="margin-top: 1.5rem;">
                    <a href="{{ url_for('profile') }}">Cancel and return to profile</a>
                </div
            </form>
        </div>
    </div>
</div>
{% endblock %}
